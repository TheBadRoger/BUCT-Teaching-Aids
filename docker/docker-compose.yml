services:
  mysql:
    image: mysql:8.0
    container_name: buctta-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: BUCTTA_DATABASE
    command: >
      --default-authentication-plugin=mysql_native_password
    ports:
      - "${MYSQL_HOST_PORT}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: [ "CMD-SHELL", "MYSQL_PWD=$$MYSQL_ROOT_PASSWORD mysql -uroot -h localhost -e 'SELECT 1'" ]
      interval: 10s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: buctta-redis
    restart: unless-stopped
    command: [ "redis-server", "--port", "6371", "--requirepass", "${REDIS_PASSWORD}" ]
    ports:
      - "${REDIS_HOST_PORT}:6371"
    healthcheck:
      test: [ "CMD-SHELL", "REDISCLI_AUTH=$$REDIS_PASSWORD redis-cli -p 6371 PING" ]
      interval: 10s
      timeout: 5s
      retries: 20

  java-backend:
    build:
      context: ..
      dockerfile: docker/java/Dockerfile
    container_name: buctta-java-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    ports:
      - "${JAVA_HOST_PORT}:80"

  python-backend:
    build:
      context: ..
      dockerfile: docker/python/Dockerfile
    container_name: buctta-python-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      APP_PROFILE: docker
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    ports:
      - "${PYTHON_HOST_PORT}:8080"
    volumes:
      - ../API/PythonAPI/face_database:/app/face_database
      - ../API/PythonAPI/uploads:/app/uploads

volumes:
  mysql_data:
