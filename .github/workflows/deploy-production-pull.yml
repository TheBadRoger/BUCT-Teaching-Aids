name: Deploy to Production (Pull Dependencies, No Build)

on:
  workflow_dispatch:

permissions: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy over SSH by pulling dependency images and restarting
        uses: appleboy/ssh-action@v1.2.0
        env:
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
          DEPLOY_PATH: ${{ secrets.PROD_DEPLOY_PATH }}
          JAVA_CONTAINER_PORT: "80"
          PYTHON_CONTAINER_PORT: "8080"
          MYSQL_CONTAINER_PORT: "3306"
          REDIS_CONTAINER_PORT: "6379"
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          envs: MYSQL_ROOT_PASSWORD,REDIS_PASSWORD,DEPLOY_PATH,JAVA_CONTAINER_PORT,PYTHON_CONTAINER_PORT,MYSQL_CONTAINER_PORT,REDIS_CONTAINER_PORT
          script: |
            set -euo pipefail
            DEPLOY_PATH="${DEPLOY_PATH:-/opt/BUCT-Teaching-Aids}"
            cd "${DEPLOY_PATH}/docker"
            ENV_FILE="$(mktemp /tmp/buctta-deploy-env.XXXXXX)"
            trap 'rm -f "${ENV_FILE}"' EXIT
            cat > "${ENV_FILE}" <<EOF
            MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
            REDIS_PASSWORD=${REDIS_PASSWORD}
            JAVA_CONTAINER_PORT=${JAVA_CONTAINER_PORT}
            PYTHON_CONTAINER_PORT=${PYTHON_CONTAINER_PORT}
            MYSQL_CONTAINER_PORT=${MYSQL_CONTAINER_PORT}
            REDIS_CONTAINER_PORT=${REDIS_CONTAINER_PORT}
            EOF
            docker compose --env-file "${ENV_FILE}" pull mysql redis
            docker compose --env-file "${ENV_FILE}" up -d --no-build
