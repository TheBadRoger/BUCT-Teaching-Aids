name: Update README Stats

on:
  push:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * *"

permissions:
  contents: write

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate stats
        run: python scripts/update_project_stats.py

      - name: Commit changes
        run: |
          if git diff --quiet; then
            echo "No stats change"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md scripts/generated/stats.json scripts/generated/README_STATS.md scripts/generated/java-unit-test-badge.json scripts/generated/python-unit-test-badge.json
          git commit -m "chore(stats): auto update README metrics"
          git push
