name: Java Backend Unit Tests

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

concurrency:
  group: badge-commit
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Run Java tests
        working-directory: API/JavaAPI
        run: mvn -B test || true

      - name: Parse and save test results
        run: |
          python3 - <<'EOF'
          import xml.etree.ElementTree as ET, json, glob, os
          reports = glob.glob("API/JavaAPI/target/surefire-reports/TEST-*.xml")
          if not reports:
              data = {"status": "no result", "passed": 0, "failed": 0, "total": 0}
          else:
              total = failed = 0
              for f in reports:
                  root = ET.parse(f).getroot()
                  total += int(root.get("tests", 0))
                  failed += int(root.get("failures", 0)) + int(root.get("errors", 0))
              data = {"status": "completed", "passed": total - failed, "failed": failed, "total": total}
          os.makedirs("scripts/generated", exist_ok=True)
          with open("scripts/generated/java-test-results.json", "w") as f:
              json.dump(data, f, indent=2)
              f.write("\n")

          # Generate badge JSON directly so the badge updates immediately
          status = data["status"]
          total = data["total"]
          failed = data["failed"]
          passed = data.get("passed", total - failed)
          if status != "completed":
              message, color = "no result", "9ca3af"
          elif failed == 0:
              case_word = "case" if passed == 1 else "cases"
              message, color = f"{passed} {case_word} passing", "22c55e"
          else:
              case_word = "case" if total == 1 else "cases"
              message, color = f"{failed} of {total} {case_word} failing", "ef4444"
          badge = {"schemaVersion": 1, "label": "Java Unit Test", "message": message, "color": color, "labelColor": "0f172a"}
          with open("scripts/generated/java-unit-test-badge.json", "w") as f:
              json.dump(badge, f, indent=2)
              f.write("\n")
          EOF

      - name: Commit test results
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/generated/java-test-results.json scripts/generated/java-unit-test-badge.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore(tests): update Java test results"
            git pull --rebase
            git push
          fi