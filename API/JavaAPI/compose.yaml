services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: BUCTTA_DATABASE
      MYSQL_USER: java_springboot_buctta
      MYSQL_PASSWORD: ${BUCTTA_JAVA_DB_PASSWORD:-buctta_dev_db_password}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-buctta_root_password}
    ports:
      - "3306:3306"
    healthcheck:
      test:
        - CMD-SHELL
        - mysqladmin ping -h 127.0.0.1 -u root -p$${MYSQL_ROOT_PASSWORD}
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  redis:
    image: redis:8.6.2
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-change_me}
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --requirepass
      - $${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    healthcheck:
      test:
        - CMD-SHELL
        - redis-cli -a $${REDIS_PASSWORD} ping
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s


