# ===========================================
# Development Environment Configuration
# ===========================================
# Activation: spring.profiles.active=dev

# ===========================================
# Flyway Configuration (Allow clean in development)
# ===========================================
spring.flyway.clean-disabled=false

# ===========================================
# Logging Level (More verbose in development)
# ===========================================
logging.level.root=INFO
logging.level.com.buctta.api=DEBUG
logging.level.org.springframework.security=DEBUG

# ===========================================
# Development-Only Feature Flags
# ===========================================
# Verification code service (true=mock send, false=real send)
app.verification-code.mock-mode=true
# Identity verification service (true=mock verify, false=real verify)
app.identity-verification.mock-mode=true
# Show SQL statements (for development debugging)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
