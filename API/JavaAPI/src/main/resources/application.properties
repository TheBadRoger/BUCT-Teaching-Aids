# ===========================================
# Application Configuration - Base File
# ===========================================
spring.application.name=BUCTTAJAPI

# Prefer JavaAPI local .env for standalone deployment only.
spring.config.import=optional:file:.env[.properties]

# Active profile (dev=development, prod=production)
# Switch methods:
#   1. Edit here: spring.profiles.active=prod
#   2. Command line: java -jar app.jar --spring.profiles.active=prod
#   3. Environment variable: SPRING_PROFILES_ACTIVE=prod
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# ===========================================
# Server Configuration
# ===========================================
server.port=${SERVER_PORT:80}

# ===========================================
# Admin Account Configuration
# ===========================================
app.admin.username=${APP_ADMIN_USERNAME:admin}
app.admin.password=${APP_ADMIN_PASSWORD:!Admin@2024Secure}

# ===========================================
# Shared MySQL Database Configuration
# ===========================================
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/BUCTTA_DATABASE?serverTimezone=UTC
spring.datasource.username=java_springboot_buctta
spring.datasource.password=${BUCTTA_JAVA_DB_PASSWORD:buctta_dev_db_password}

# ===========================================
# Shared Redis Configuration
# ===========================================
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:change_me}
spring.data.redis.timeout=60000
spring.data.redis.lettuce.pool.enabled=true
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=0
spring.data.redis.lettuce.pool.max-wait=100ms
spring.data.redis.lettuce.pool.time-between-eviction-runs=2s

# ===========================================
# File Upload Configuration
# ===========================================
spring.servlet.multipart.max-file-size=256MB
spring.servlet.multipart.max-request-size=256MB
server.max-http-request-header-size=512MB

# ===========================================
# Session Configuration
# ===========================================
app.auth.idle-timeout=10m
server.servlet.session.timeout=${app.auth.idle-timeout}

# ===========================================
# Flyway Database Migration Configuration
# ===========================================
spring.flyway.enabled=true
spring.flyway.locations=classpath:dbmigrate
spring.flyway.baseline-on-migrate=true
spring.flyway.out-of-order=false
spring.flyway.validate-on-migrate=false
