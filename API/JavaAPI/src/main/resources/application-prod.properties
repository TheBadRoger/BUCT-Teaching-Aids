# ===========================================
# Production Environment Configuration
# ===========================================
# Activation: spring.profiles.active=prod

# ===========================================
# Flyway Configuration (Disallow clean in production)
# ===========================================
spring.flyway.clean-disabled=true

# ===========================================
# Logging Level (Reduced verbosity in production)
# ===========================================
logging.level.root=WARN
logging.level.com.buctta.api=INFO

# ===========================================
# Production Feature Flags
# ===========================================
# Verification code service (true=mock send, false=real send)
app.verification-code.mock-mode=false
# Identity verification service (true=mock verify, false=real verify)
app.identity-verification.mock-mode=false
# Hide SQL statements
spring.jpa.show-sql=false

# ===========================================
# SMS Service Configuration (Optional)
# ===========================================
# sms.aliyun.access-key-id=${ALIYUN_ACCESS_KEY_ID}
# sms.aliyun.access-key-secret=${ALIYUN_ACCESS_KEY_SECRET}
# sms.aliyun.sign-name=YOUR_SIGN_NAME
# sms.aliyun.template-code=YOUR_TEMPLATE_CODE

