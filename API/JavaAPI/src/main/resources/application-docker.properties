# ===========================================
# Docker Deployment Configuration (docker profile only)
# ===========================================

# Fix internal listening port for Java container
server.port=80

# Docker internal network addresses and fixed container ports
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://mysql:3306/BUCTTA_DATABASE?serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=${MYSQL_ROOT_PASSWORD:}

spring.data.redis.host=redis
spring.data.redis.port=6371
spring.data.redis.password=${REDIS_PASSWORD:}

# Keep migration policy consistent with current docker deployment behavior
spring.flyway.enabled=false
